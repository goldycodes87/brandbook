<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Book — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c0a09;
      color: #d6d3d1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fafaf9; }
    p { font-size: 0.95rem; color: #a8a29e; text-align: center; max-width: 280px; }
    span { font-size: 2.5rem; }
  </style>
</head>
<body>
  <span>🐄</span>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your data will sync when you're back online.</p>
</body>
</html>
